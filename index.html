<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="sjfbo writes and builds at the intersection of software engineering, machine learning, and mathematics."
    />
    <meta name="theme-color" content="#030304" />
    <title>sjfbo</title>
    <script>
      (() => {
        try {
          const theme = localStorage.getItem("sjfbo-theme");
          if (theme === "light" || theme === "dark") {
            document.documentElement.dataset.theme = theme;
            document.documentElement.style.colorScheme = theme;
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
